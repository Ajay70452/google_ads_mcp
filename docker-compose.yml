services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ga_auto
      POSTGRES_USER: ga_user
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
